name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Refresh MBS data
        run: dotnet run --project MedicareRebateChecker.DataUpdater/MedicareRebateChecker.DataUpdater.csproj -- MedicareRebateChecker.Web/wwwroot/data

      - name: Publish
        run: dotnet publish MedicareRebateChecker.Web/MedicareRebateChecker.Web.csproj -c Release -o publish

      - name: Prepare Pages artifact
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          sed -i 's#<base href="/" />#<base href="/pathology-comparison/" />#' publish/wwwroot/index.html
          sed -i 's#<base href="/" />#<base href="/pathology-comparison/" />#' publish/wwwroot/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
